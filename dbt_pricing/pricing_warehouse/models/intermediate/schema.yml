version: 2

models:
  - name: int_product_enrichment
    description: Enriched shopping listings used for mart-level modeling.
    columns:
      - name: title
        description: Product title.
        tests:
          - not_null

      - name: product_link
        description: Product URL.
        tests:
          - not_null

      - name: source
        description: Seller or source name.
        tests:
          - not_null

      - name: captured_at
        description: Date the listing was captured.
        tests:
          - not_null

      - name: price
        description: Current listing price.
        tests:
          - not_null

      - name: price_tier
        description: Price grouping derived from the listing price.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['cheap', 'medium', 'expensive']

      - name: free_delivery
        description: Whether the listing has free delivery.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: second_hand_condition
        description: Whether the item is used or second-hand.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
